name: release

# Tag a release to build cross-platform binaries and publish them:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # tags, for `git describe`
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build + package all platforms
        run: ./scripts/release.sh
        env:
          VERSION: ${{ github.ref_name }}

      - name: Verify archive contents
        # Same gate CI runs on every PR — so a release can never publish a corrupt
        # archive, a console-subsystem CoinRollHunter.exe, or an empty embedded UI.
        run: ./scripts/verify-archives.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/coinrollhunter_*.tar.gz
            dist/coinrollhunter_*.zip
            dist/checksums.txt
