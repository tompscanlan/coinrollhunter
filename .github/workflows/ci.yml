name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build UI
        run: cd web/app && npm ci --no-audit --no-fund && npm run build

      - name: Type-check UI
        run: cd web/app && npm run check

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...
