# goreleaser config (optional alternative to scripts/release.sh).
#   goreleaser release --clean      # tagged release
#   goreleaser build --snapshot --clean   # local test build
# Pure-Go SQLite => CGO_ENABLED=0, no cross toolchain needed.
version: 2
project_name: coinrollhunter

before:
  hooks:
    - bash -c "cd web/app && npm ci --no-audit --no-fund && npm run build"

builds:
  - id: coinrollhunter
    main: ./cmd/coinrollhunter
    binary: coinrollhunter
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: "coinrollhunter_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

release:
  github:
    owner: tompscanlan
    name: coinrollhunter
  draft: true
  prerelease: auto

changelog:
  use: github
